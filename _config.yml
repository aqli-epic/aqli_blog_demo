title: "Air Quality Life Index Blog"
tagline: "Air pollution, translated into years of life"
description: "A colorful, Markdown-first GitHub Pages blog for AQLI-style data stories on air pollution, life expectancy, and clean-air policy."
author: "AQLI Team"

# Project site example:
# https://YOUR-USERNAME.github.io/aqli-blog
url: "https://YOUR-USERNAME.github.io"
baseurl: "/aqli-blog"

markdown: kramdown
permalink: /blog/:year/:month/:day/:title/

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
