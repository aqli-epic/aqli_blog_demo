---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.excerpt %}
      <p class="lead">{{ page.excerpt }}</p>
    {% endif %}

    {% if page.tags %}
      <div class="tag-row">
        {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
